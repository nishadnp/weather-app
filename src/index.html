<!-- ./src/index.html -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
  </head>
  <body>
    <header class="main-header">
      <img
        src="./assets/images/site-logo.png"
        alt="Day and Night Weather App logo"
        class="page-logo"
      />
      <form id="weather-form">
        <label for="cityInput">
          <input
            type="text"
            id="cityInput"
            placeholder="Enter city name"
            aria-label="City name"
            required
          />
        </label>
        <button type="submit">Get Weather</button>
      </form>
      <div class="header-date">Date Placeholder</div>
    </header>
    <!-- Simple form to input city name for fetching weather data -->

    <main>
      <aside id="stats-sidebar">
        <h2>Today Highlights</h2>
        <div class="highlights-grid">
          <article class="highlight-card">
            <div>
              <img
                src="./assets/icons/windspeed-icon.svg"
                alt="Wind Speed icon"
                class="highlight-icon"
              />
              <h4>Wind Speed</h4>
            </div>
          </article>
          <article class="highlight-card">
            <div>
              <img
                src="./assets/icons/humidity-icon.svg"
                alt="Humidity icon"
                class="highlight-icon"
              />
              <h4>Humidity</h4>
            </div>
          </article>
          <article class="highlight-card">
            <div>
              <img
                src="./assets/icons/uv-icon.svg"
                alt="UV Index icon"
                class="highlight-icon"
              />
              <h4>UV Index</h4>
            </div>
          </article>
          <article class="highlight-card">
            <div>
              <img
                src="./assets/icons/visibility-icon.svg"
                alt="Visibility icon"
                class="highlight-icon"
              />
              <h4>Visibility</h4>
            </div>
          </article>
        </div>
      </aside>
      <section id="weather-hero-display">
        <div class="weather-info-wrapper">
          <div>
            <img
              src="https://via.placeholder.com/150"
              alt="N/A"
              class="weather-icon"
            />
            <p class="weather-condition">Not Available</p>
          </div>
          <p class="weather-description">
            Search for a city to get weather information
          </p>
        </div>
        <div class="temperature-wrapper">
          <p class="temperature-current">_____</p>

          <div class="temperature-range">
            <p>
              <span>H</span>
              <span class="temperature-highest">-------</span>
            </p>
            <p>
              <span>L</span>
              <span class="temperature-lowest">-------</span>
            </p>
          </div>
        </div>
        <div class="location-wrapper">
          <img
            src="./assets/icons/location.svg"
            alt="Location icon"
            class="location-icon"
          />
          <p class="location">____________________</p>
        </div>
      </section>
      <section id="extras">
        <article></article>
        <article></article>
      </section>
      <section id="nextdays-forecast">
        <ul class="forecast-list">
          <li>
            <article class="forecast-card">
              <p class="forecast-tempmax"></p>
              <p class="forecast-dayname"></p>
            </article>
          </li>
          <li>
            <article class="forecast-card">
              <p class="forecast-tempmax"></p>
              <p class="forecast-dayname"></p>
            </article>
          </li>
          <li>
            <article class="forecast-card">
              <p class="forecast-tempmax"></p>
              <p class="forecast-dayname"></p>
            </article>
          </li>
          <li>
            <article class="forecast-card">
              <p class="forecast-tempmax"></p>
              <p class="forecast-dayname"></p>
            </article>
          </li>
          <li>
            <article class="forecast-card">
              <p class="forecast-tempmax"></p>
              <p class="forecast-dayname"></p>
            </article>
          </li>
        </ul>
      </section>
    </main>
  </body>
</html>
