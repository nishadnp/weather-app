<!-- ./src/index.html -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
  </head>
  <body>
    <header class="main-header">
      <img
        src="./assets/images/site-logo.png"
        alt="Day and Night Weather App logo"
        class="page-logo"
      />
      <form id="weather-form">
        <label for="cityInput">
          <input
            type="text"
            id="cityInput"
            placeholder="Enter city name"
            aria-label="City name"
            required
          />
        </label>
        <button type="submit">Get Weather</button>
      </form>
      <div class="header-date">Date Placeholder</div>
    </header>
    <!-- Simple form to input city name for fetching weather data -->

    <main>
      <aside class="stats-sidebar">
        <h2>Today Highlights</h2>
        <div class="highlights-grid">
          <article class="highlight-card">
            <div>
              <img
                src="./assets/images/icons/windspeed-icon.svg"
                alt="Wind Speed icon"
                class="highlight-icon"
              />
              <h4>Wind Speed</h4>
            </div>
          </article>
          <article class="highlight-card">
            <div>
              <img
                src="./assets/images/icons/humidity-icon.svg"
                alt="Humidity icon"
                class="highlight-icon"
              />
              <h4>Humidity</h4>
            </div>
          </article>
          <article class="highlight-card">
            <div>
              <img
                src="./assets/images/icons/uv-icon.svg"
                alt="UV Index icon"
                class="highlight-icon"
              />
              <h4>UV Index</h4>
            </div>
          </article>
          <article class="highlight-card">
            <div>
              <img
                src="./assets/images/icons/visibility-icon.svg"
                alt="Visibility icon"
                class="highlight-icon"
              />
              <h4>Visibility</h4>
            </div>
          </article>
        </div>
      </aside>
      <section class="weather-content"></section>
    </main>
  </body>
</html>
