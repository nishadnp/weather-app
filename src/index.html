<!-- ./src/index.html -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
  </head>
  <body>
    <header class="main-header">
      <img
        src="./assets/images/site-logo.png"
        alt="Day and Night Weather App logo"
        class="page-logo"
      />
      <form id="weather-form">
        <label for="cityInput">
          <input
            type="text"
            id="cityInput"
            placeholder="Enter city name"
            aria-label="City name"
            required
          />
        </label>
        <button type="submit">Get Weather</button>
      </form>
      <div class="header-date">Date Placeholder</div>
    </header>
    <!-- Simple form to input city name for fetching weather data -->

    <aside id="stats-sidebar">
      <h2>Today Highlights</h2>
      <div class="highlights-grid">
        <article class="highlight-card">
          <div>
            <img
              src="./assets/icons/windspeed-icon.svg"
              alt="Wind Speed icon"
              class="highlight-icon"
            />
            <h4>Wind Speed</h4>
          </div>
        </article>
        <article class="highlight-card">
          <div>
            <img
              src="./assets/icons/humidity-icon.svg"
              alt="Humidity icon"
              class="highlight-icon"
            />
            <h4>Humidity</h4>
          </div>
        </article>
        <article class="highlight-card">
          <div>
            <img
              src="./assets/icons/uv-icon.svg"
              alt="UV Index icon"
              class="highlight-icon"
            />
            <h4>UV Index</h4>
          </div>
        </article>
        <article class="highlight-card">
          <div>
            <img
              src="./assets/icons/visibility-icon.svg"
              alt="Visibility icon"
              class="highlight-icon"
            />
            <h4>Visibility</h4>
          </div>
        </article>
      </div>
    </aside>

    <main>
      <section id="weather-hero-display">
        <div class="weather-info-wrapper">
          <div>
            <img
              src="https://via.placeholder.com/150"
              alt="N/A"
              class="weather-icon"
            />
            <p class="weather-condition">Not Available</p>
          </div>
          <p class="weather-description">
            Search for a city to get weather information
          </p>
        </div>
        <div class="temperature-wrapper">
          <p class="temperature-current">_____</p>

          <div class="temperature-range">
            <p>
              <span>H</span>
              <span class="temperature-highest">-------</span>
            </p>
            <p>
              <span>L</span>
              <span class="temperature-lowest">-------</span>
            </p>
          </div>
        </div>
        <div class="location-wrapper">
          <img
            src="./assets/icons/location.svg"
            alt="Location icon"
            class="location-icon"
          />
          <p class="location">____________________</p>
        </div>
      </section>
      <section id="extras">
        <article></article>
        <article class="sunrise-sunset-container">
          <h3>Sunrise & Sunset</h3>

          <div>
            <img
              src="./assets/images/sun-position-path.svg"
              alt="Sun position path trajectory"
              class="sun-position-path"
            />

            <div class="sunrise-sunset-wrapper">
              <div class="sunrise-info">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="23"
                  height="23"
                  fill="currentColor"
                  class="bi bi-sunrise"
                  viewBox="0 0 16 16"
                >
                  <path
                    d="M7.646 1.146a.5.5 0 0 1 .708 0l1.5 1.5a.5.5 0 0 1-.708.708L8.5 2.707V4.5a.5.5 0 0 1-1 0V2.707l-.646.647a.5.5 0 1 1-.708-.708zM2.343 4.343a.5.5 0 0 1 .707 0l1.414 1.414a.5.5 0 0 1-.707.707L2.343 5.05a.5.5 0 0 1 0-.707m11.314 0a.5.5 0 0 1 0 .707l-1.414 1.414a.5.5 0 1 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0M8 7a3 3 0 0 1 2.599 4.5H5.4A3 3 0 0 1 8 7m3.71 4.5a4 4 0 1 0-7.418 0H.499a.5.5 0 0 0 0 1h15a.5.5 0 0 0 0-1h-3.79zM0 10a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1h-2A.5.5 0 0 1 0 10m13 0a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1h-2a.5.5 0 0 1-.5-.5"
                  />
                </svg>
                <p>Sunrise</p>
                <p class="sunrise-time">--:--</p>
              </div>

              <img
                src="./assets/images/twilight.svg"
                alt="Twilight"
                class="twilight"
              />

              <div class="sunset-info">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="23"
                  height="23"
                  fill="currentColor"
                  class="bi bi-sunset"
                  viewBox="0 0 16 16"
                >
                  <path
                    d="M7.646 4.854a.5.5 0 0 0 .708 0l1.5-1.5a.5.5 0 0 0-.708-.708l-.646.647V1.5a.5.5 0 0 0-1 0v1.793l-.646-.647a.5.5 0 1 0-.708.708zm-5.303-.51a.5.5 0 0 1 .707 0l1.414 1.413a.5.5 0 0 1-.707.707L2.343 5.05a.5.5 0 0 1 0-.707zm11.314 0a.5.5 0 0 1 0 .706l-1.414 1.414a.5.5 0 1 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zM8 7a3 3 0 0 1 2.599 4.5H5.4A3 3 0 0 1 8 7m3.71 4.5a4 4 0 1 0-7.418 0H.499a.5.5 0 0 0 0 1h15a.5.5 0 0 0 0-1h-3.79zM0 10a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1h-2A.5.5 0 0 1 0 10m13 0a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1h-2a.5.5 0 0 1-.5-.5"
                  />
                </svg>
                <p>Sunset</p>
                <p class="sunset-time">--:--</p>
              </div>
            </div>
          </div>
        </article>
      </section>
      <section id="nextdays-forecast">
        <ul class="forecast-list">
          <li>
            <article class="forecast-card">
              <p class="forecast-tempmax"></p>
              <p class="forecast-dayname"></p>
            </article>
          </li>
          <li>
            <article class="forecast-card">
              <p class="forecast-tempmax"></p>
              <p class="forecast-dayname"></p>
            </article>
          </li>
          <li>
            <article class="forecast-card">
              <p class="forecast-tempmax"></p>
              <p class="forecast-dayname"></p>
            </article>
          </li>
          <li>
            <article class="forecast-card">
              <p class="forecast-tempmax"></p>
              <p class="forecast-dayname"></p>
            </article>
          </li>
          <li>
            <article class="forecast-card">
              <p class="forecast-tempmax"></p>
              <p class="forecast-dayname"></p>
            </article>
          </li>
        </ul>
      </section>
    </main>
  </body>
</html>
