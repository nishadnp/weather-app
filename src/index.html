<!-- src/index.html -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
  </head>
  <body class="debug--layout">
    <!-- App header: logo + city search + date display -->
    <header class="header">
      <img
        src="./assets/images/site-logo.png"
        alt="Day and Night Weather App logo"
        class="header__logo"
      />

      <!-- Simple form to input location for fetching weather data -->
      <form class="header__form glass-panel">
        <div class="header__controls">
          <label for="locationInput" class="visually-hidden"
            >Enter location:
          </label>
          <input
            type="text"
            id="locationInput"
            class="header__input"
            placeholder="Enter city, address, or coordinates"
            required
          />

          <div class="dropdown" id="unitDropdown">
            <button
              type="button"
              class="dropdown-toggle"
              aria-haspopup="listbox"
              aria-expanded="false"
            >
              °C, km
              <span class="dropdown-icon">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  height="24px"
                  viewBox="0 -960 960 960"
                  width="24px"
                  fill="#ffffff"
                >
                  <path d="M480-360 280-560h400L480-360Z" />
                </svg>
              </span>
            </button>

            <ul class="dropdown-menu glass-panel" role="listbox">
              <li role="option" data-value="metric">°C, km</li>
              <li role="option" data-value="us">°F, miles</li>
              <li role="option" data-value="uk">°C, miles</li>
            </ul>
          </div>
        </div>
        <button class="header__button" type="submit" aria-label="Get weather">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            height="24"
            viewBox="0 -960 960 960"
            width="24"
            fill="#e3e3e3"
          >
            <path
              d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580t75.5-184.5T380-840t184.5 
            75.5T640-580q0 44-14 83t-38 69l252 252zM380-400q75 0 127.5-52.5T560-580t-52.5-127.5T380-760t-127.5 
            52.5T200-580t52.5 127.5T380-400"
            />
          </svg>
        </button>
      </form>
      <div class="header__date glass-panel">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          height="24"
          viewBox="0 -960 960 960"
          width="24"
          fill="#e3e3e3"
        >
          <path
            d="M289-329q-29-29-29-71t29-71 71-29 71 29 29 71-29 71-71 29-71-29M200-80q-33 0-56.5-23.5T120-160v-560q0-33 23.5-56.5T200-800h40v-80h80v80h320v-80h80v80h40q33 0 56.5 23.5T840-720v560q0 33-23.5 56.5T760-80zm0-80h560v-400H200zm0-480h560v-80H200zm0 0v-80z"
          />
        </svg>
        <p>Not Available</p>
      </div>
    </header>

    <!-- Sidebar: weather highlights (wind, humidity, UV, visibility) -->
    <aside class="sidebar glass-panel debug--component">
      <section class="highlights">
        <h3 class="highlights__title">Today Highlights</h3>
        <div class="highlights__grid debug--card">
          <article class="highlights-card glass-panel">
            <div class="highlights-card__header">
              <img
                src="./assets/icons/precipitation-icon.svg"
                alt="Icon for precipitation chance"
                class="highlights-card__icon"
              />
              <h4 class="highlights-card__title">Precip. Chance</h4>
            </div>
            <p class="highlights-card__data"></p>
            <p class="highlights-card__footnote"></p>
          </article>
          <article class="highlights-card glass-panel">
            <div class="highlights-card__header">
              <img
                src="./assets/icons/humidity-icon.svg"
                alt="Icon for humidity level"
                class="highlights-card__icon"
              />
              <h4 class="highlights-card__title">Humidity</h4>
            </div>
            <p class="highlights-card__data"></p>
            <p class="highlights-card__footnote"></p>
          </article>
          <article class="highlights-card glass-panel">
            <div class="highlights-card__header">
              <img
                src="./assets/icons/uv-icon.svg"
                alt="Icon for UV index"
                class="highlights-card__icon"
              />
              <h4 class="highlights-card__title">UV Index</h4>
            </div>
            <p class="highlights-card__data"></p>
            <p class="highlights-card__footnote"></p>
          </article>
          <article class="highlights-card glass-panel">
            <div class="highlights-card__header">
              <img
                src="./assets/icons/visibility-icon.svg"
                alt="Icon for visibility distance"
                class="highlights-card__icon"
              />
              <h4 class="highlights-card__title">Visibility</h4>
            </div>
            <p class="highlights-card__data"></p>
            <p class="highlights-card__footnote"></p>
          </article>
        </div>
      </section>
    </aside>

    <main class="debug--component">
      <!-- Main weather display: current conditions + temperature + location -->
      <section class="weather-hero debug--element">
        <div class="weather-hero__info">
          <div class="weather-hero__header">
            <img
              src="https://via.placeholder.com/150"
              alt="N/A"
              class="weather-hero__icon"
            />
            <p class="weather-hero__condition">Not Available</p>
          </div>
          <p class="weather-hero__description">
            Search for a city to get weather information
          </p>
        </div>
        <div class="weather-hero__temperature">
          <p class="weather-hero__temperature-current">_____</p>

          <div class="weather-hero__temperature-range">
            <p class="glass-panel">
              <span>H</span>
              <span class="weather-hero__temperature-high">-------</span>
            </p>
            <p class="glass-panel">
              <span>L</span>
              <span class="weather-hero__temperature-low">-------</span>
            </p>
          </div>
        </div>
        <div class="weather-hero__location">
          <img
            src="./assets/icons/location.svg"
            alt="Location icon"
            class="weather-hero__location-icon"
          />
          <p class="weather-hero__location-text">____________________</p>
        </div>
      </section>

      <!-- Insight Cards: Wind Status and Sun Twilight timings -->
      <section class="insights debug--card">
        <article class="insights__wind glass-panel">
          <header class="insights__header">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              height="24px"
              viewBox="0 -960 960 960"
              width="24px"
              fill="#e3e3e3"
            >
              <path
                d="M460-160q-50 0-85-35t-35-85h80q0 17 11.5 28.5T460-240q17 0 28.5-11.5T500-280q0-17-11.5-28.5T460-320H80v-80h380q50 0 85 35t35 85q0 50-35 85t-85 35ZM80-560v-80h540q26 0 43-17t17-43q0-26-17-43t-43-17q-26 0-43 17t-17 43h-80q0-59 40.5-99.5T620-840q59 0 99.5 40.5T760-700q0 59-40.5 99.5T620-560H80Zm660 320v-80q26 0 43-17t17-43q0-26-17-43t-43-17H80v-80h660q59 0 99.5 40.5T880-380q0 59-40.5 99.5T740-240Z"
              />
            </svg>
            <h3 class="insights__title">Wind Status</h3>
          </header>
          <div class="insights__body">
            <svg
              class="wind-chart"
              viewBox="0 0 192.5 100"
              preserveAspectRatio="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <g
                class="wind-chart__histogram"
                fill="rgba(255, 255, 255, 0.1)"
              />
              <polyline class="wind-chart__trendline" />
            </svg>
            <div class="insights__stats"></div>
          </div>
        </article>

        <article class="insights__astronomy astronomy--sun glass-panel">
          <!-- Sun module: sunrise/sunset visualization (static now, animated later) -->
          <div class="sun">
            <h3 class="sun__title">Sunrise & Sunset</h3>
            <div class="sun__body">
              <img
                src="./assets/images/sun-position-path.svg"
                alt="Sun Path diagram"
                class="sun__path"
              />

              <div class="sun__events">
                <div class="sun__event sun__event--sunrise">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="23"
                    height="23"
                    fill="currentColor"
                    class="bi bi-sunrise"
                    viewBox="0 0 16 16"
                  >
                    <path
                      d="M7.646 1.146a.5.5 0 0 1 .708 0l1.5 1.5a.5.5 0 0 1-.708.708L8.5 2.707V4.5a.5.5 0 0 1-1 0V2.707l-.646.647a.5.5 0 1 1-.708-.708zM2.343 4.343a.5.5 0 0 1 .707 0l1.414 1.414a.5.5 0 0 1-.707.707L2.343 5.05a.5.5 0 0 1 0-.707m11.314 0a.5.5 0 0 1 0 .707l-1.414 1.414a.5.5 0 1 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0M8 7a3 3 0 0 1 2.599 4.5H5.4A3 3 0 0 1 8 7m3.71 4.5a4 4 0 1 0-7.418 0H.499a.5.5 0 0 0 0 1h15a.5.5 0 0 0 0-1h-3.79zM0 10a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1h-2A.5.5 0 0 1 0 10m13 0a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1h-2a.5.5 0 0 1-.5-.5"
                    />
                  </svg>
                  <p class="sun__event-label">Sunrise</p>
                  <p class="sun__event-time">--:--</p>
                </div>

                <img
                  src="./assets/images/twilight-line-art.svg"
                  alt="Twilight line-art"
                  class="sun__decoration"
                />

                <div class="sun__event sun__event--sunset">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="23"
                    height="23"
                    fill="currentColor"
                    class="bi bi-sunset"
                    viewBox="0 0 16 16"
                  >
                    <path
                      d="M7.646 4.854a.5.5 0 0 0 .708 0l1.5-1.5a.5.5 0 0 0-.708-.708l-.646.647V1.5a.5.5 0 0 0-1 0v1.793l-.646-.647a.5.5 0 1 0-.708.708zm-5.303-.51a.5.5 0 0 1 .707 0l1.414 1.413a.5.5 0 0 1-.707.707L2.343 5.05a.5.5 0 0 1 0-.707zm11.314 0a.5.5 0 0 1 0 .706l-1.414 1.414a.5.5 0 1 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zM8 7a3 3 0 0 1 2.599 4.5H5.4A3 3 0 0 1 8 7m3.71 4.5a4 4 0 1 0-7.418 0H.499a.5.5 0 0 0 0 1h15a.5.5 0 0 0 0-1h-3.79zM0 10a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1h-2A.5.5 0 0 1 0 10m13 0a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1h-2a.5.5 0 0 1-.5-.5"
                    />
                  </svg>
                  <p class="sun__event-label">Sunset</p>
                  <p class="sun__event-time">--:--</p>
                </div>
              </div>
            </div>
          </div>
          <!-- Moon module (future: moon phase + rise/set toggle target) -->
          <div class="moon">
            <!--To be added in future-->
          </div>
        </article>
      </section>

      <!-- 5-day forecast (dynamic weather data rendering) -->
      <section class="forecast">
        <ul class="forecast__list">
          <li class="forecast__item">
            <article class="forecast__card">
              <p class="forecast__temp-max"></p>
              <p class="forecast__day-name"></p>
            </article>
          </li>
          <li class="forecast__item">
            <article class="forecast__card">
              <p class="forecast__temp-max"></p>
              <p class="forecast__day-name"></p>
            </article>
          </li>
          <li class="forecast__item">
            <article class="forecast__card">
              <p class="forecast__temp-max"></p>
              <p class="forecast__day-name"></p>
            </article>
          </li>
          <li class="forecast__item">
            <article class="forecast__card">
              <p class="forecast__temp-max"></p>
              <p class="forecast__day-name"></p>
            </article>
          </li>
          <li class="forecast__item">
            <article class="forecast__card">
              <p class="forecast__temp-max"></p>
              <p class="forecast__day-name"></p>
            </article>
          </li>
        </ul>
      </section>
    </main>
  </body>
</html>
