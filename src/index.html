<!-- ./src/index.html -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
  </head>
  <body>
    <header class="main-header">
      <img
        src="./assets/images/web-logo.png"
        alt="Day and Night Weather App logo"
        class="page-logo"
      />
      <form id="weather-form">
        <label for="cityInput">
          <input
            type="text"
            id="cityInput"
            placeholder="Enter city name"
            aria-label="City name"
            required
          />
        </label>
        <button type="submit">Get Weather</button>
      </form>
      <div class="header-date">Date Placeholder</div>
    </header>
    <!-- Simple form to input city name for fetching weather data -->

    <main></main>
  </body>
</html>
